<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Messenger</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-theme="light">

  <div id="app">

    <div id="auth-screen" class="screen active">
      <div class="auth-container glass">
        <div class="auth-logo">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" rx="14" fill="var(--accent)"/>
            <path d="M14 18C14 15.79 15.79 14 18 14H30C32.21 14 34 15.79 34 18V28C34 30.21 32.21 32 30 32H26L22 36V32H18C15.79 32 14 30.21 14 28V18Z" fill="white"/>
          </svg>
        </div>
        <h1 class="auth-title">Messenger</h1>
        <p class="auth-subtitle">Войдите, чтобы продолжить</p>
        <form id="auth-form" novalidate>
          <div class="input-group">
            <input type="text" id="auth-name" placeholder=" " autocomplete="username" required minlength="2">
            <label for="auth-name">Имя пользователя</label>
            <div class="input-error" id="auth-name-error"></div>
          </div>
          <div class="input-group">
            <input type="password" id="auth-password" placeholder=" " autocomplete="current-password" required minlength="4">
            <label for="auth-password">Пароль</label>
            <div class="input-error" id="auth-password-error"></div>
          </div>
          <button type="submit" class="btn btn-primary btn-full ripple">
            <span>Войти</span>
          </button>
        </form>
      </div>
    </div>

    <div id="messenger-screen" class="screen">
      <header id="main-header" class="glass">
        <div class="header-left">
          <button id="sidebar-toggle" class="btn-icon ripple" aria-label="Меню">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <div id="header-chat-info" class="header-chat-info">
            <span class="header-chat-name">Messenger</span>
          </div>
        </div>
        <div class="header-center">
          <div id="connection-status" class="connection-status hidden">
            <div class="connection-dot"></div>
            <span>Подключение...</span>
          </div>
        </div>
        <div class="header-right">
          <button id="settings-btn" class="btn-icon ripple" aria-label="Настройки">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
          </button>
        </div>
      </header>

      <div id="main-layout">
        <aside id="sidebar" class="sidebar glass">
          <div class="sidebar-header">
            <div class="search-box">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input type="text" id="chat-search" placeholder="Поиск чатов...">
            </div>
            <button id="new-chat-btn" class="btn-icon ripple" aria-label="Новый чат">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </button>
          </div>
          <div id="chat-list" class="chat-list">
            <div class="skeleton-list" id="skeleton-list">
              <div class="skeleton-item"><div class="skeleton-avatar"></div><div class="skeleton-text"><div class="skeleton-line w80"></div><div class="skeleton-line w60"></div></div></div>
              <div class="skeleton-item"><div class="skeleton-avatar"></div><div class="skeleton-text"><div class="skeleton-line w80"></div><div class="skeleton-line w60"></div></div></div>
              <div class="skeleton-item"><div class="skeleton-avatar"></div><div class="skeleton-text"><div class="skeleton-line w80"></div><div class="skeleton-line w60"></div></div></div>
              <div class="skeleton-item"><div class="skeleton-avatar"></div><div class="skeleton-text"><div class="skeleton-line w80"></div><div class="skeleton-line w60"></div></div></div>
              <div class="skeleton-item"><div class="skeleton-avatar"></div><div class="skeleton-text"><div class="skeleton-line w80"></div><div class="skeleton-line w60"></div></div></div>
            </div>
          </div>
        </aside>

        <main id="chat-area" class="chat-area">
          <div id="chat-empty" class="chat-empty">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="1">
              <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
            </svg>
            <p>Выберите чат или начните новый</p>
          </div>
          <div id="chat-messages" class="chat-messages hidden"></div>
          <div id="typing-indicator" class="typing-indicator hidden">
            <div class="typing-dots"><span></span><span></span><span></span></div>
            <span class="typing-text">печатает...</span>
          </div>
          <div id="chat-input-area" class="chat-input-area hidden">
            <div id="reply-preview" class="reply-preview hidden">
              <div class="reply-info">
                <span class="reply-name"></span>
                <span class="reply-text"></span>
              </div>
              <button id="reply-cancel" class="btn-icon-sm ripple">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
              </button>
            </div>
            <div id="voice-recording" class="voice-recording hidden">
              <div class="voice-wave" id="voice-wave"></div>
              <span id="voice-timer" class="voice-timer">00:00</span>
              <button id="voice-cancel" class="btn-icon-sm ripple">✕</button>
              <button id="voice-send" class="btn-icon-sm ripple voice-send-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
                </svg>
              </button>
            </div>
            <div id="input-row" class="input-row">
              <button id="attach-btn" class="btn-icon ripple" aria-label="Прикрепить файл">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                </svg>
              </button>
              <div class="message-input-wrap">
                <textarea id="message-input" placeholder="Сообщение..." rows="1"></textarea>
              </div>
              <button id="voice-btn" class="btn-icon ripple" aria-label="Голосовое сообщение">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
              </button>
              <button id="send-btn" class="btn-icon send-btn ripple hidden" aria-label="Отправить">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
                </svg>
              </button>
            </div>
            <input type="file" id="file-input" multiple accept="image/*,.pdf,.doc,.docx,.txt" hidden>
          </div>
        </main>
      </div>
    </div>

    <div id="settings-modal" class="modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-content glass">
        <div class="modal-header">
          <h2>Настройки</h2>
          <button class="modal-close btn-icon ripple">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="settings-section">
            <h3>Аккаунт</h3>
            <div class="profile-edit">
              <div class="avatar-upload" id="avatar-upload">
                <img id="avatar-preview" class="avatar-img" src="" alt="Аватар">
                <div class="avatar-overlay">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/>
                  </svg>
                </div>
                <input type="file" id="avatar-input" accept="image/*" hidden>
              </div>
              <div class="profile-fields">
                <div class="input-group compact">
                  <input type="text" id="profile-name" placeholder=" ">
                  <label for="profile-name">Имя</label>
                </div>
                <div class="input-group compact">
                  <input type="text" id="profile-status" placeholder=" " value="В сети">
                  <label for="profile-status">Статус</label>
                </div>
              </div>
            </div>
          </div>
          <div class="settings-section">
            <h3>Внешний вид</h3>
            <div class="setting-row">
              <span>Тёмная тема</span>
              <label class="toggle">
                <input type="checkbox" id="theme-toggle">
                <span class="toggle-slider"></span>
              </label>
            </div>
            <div class="setting-row">
              <span>Фон чата</span>
              <div class="bg-options" id="bg-options">
                <button class="bg-option active" data-bg="default" title="По умолчанию">
                  <div class="bg-preview" style="background: var(--bg-chat)"></div>
                </button>
                <button class="bg-option" data-bg="dots" title="Точки">
                  <div class="bg-preview bg-dots"></div>
                </button>
                <button class="bg-option" data-bg="gradient1" title="Градиент 1">
                  <div class="bg-preview" style="background: linear-gradient(135deg, #667eea, #764ba2)"></div>
                </button>
                <button class="bg-option" data-bg="gradient2" title="Градиент 2">
                  <div class="bg-preview" style="background: linear-gradient(135deg, #f093fb, #f5576c)"></div>
                </button>
                <button class="bg-option" data-bg="custom" title="Своя картинка">
                  <div class="bg-preview bg-custom">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                  </div>
                  <input type="file" id="bg-image-input" accept="image/*" hidden>
                </button>
              </div>
            </div>
          </div>
          <div class="settings-section">
            <h3>Уведомления</h3>
            <div class="setting-row">
              <span>Push-уведомления</span>
              <label class="toggle">
                <input type="checkbox" id="push-toggle">
                <span class="toggle-slider"></span>
              </label>
            </div>
            <div class="setting-row">
              <span>Звуки</span>
              <label class="toggle">
                <input type="checkbox" id="sound-toggle" checked>
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
          <div class="settings-section">
            <h3>Данные</h3>
            <button class="btn btn-danger btn-full ripple" id="clear-cache-btn">Очистить кэш</button>
            <button class="btn btn-secondary btn-full ripple" id="logout-btn" style="margin-top:8px">Выйти</button>
          </div>
        </div>
      </div>
    </div>

    <div id="profile-modal" class="modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-content glass modal-sm">
        <div class="modal-header">
          <h2>Профиль</h2>
          <button class="modal-close btn-icon ripple">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="modal-body" id="profile-modal-body"></div>
      </div>
    </div>

    <div id="image-viewer" class="image-viewer hidden">
      <div class="image-viewer-backdrop"></div>
      <img id="viewer-image" src="" alt="">
      <button class="image-viewer-close btn-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div id="context-menu" class="context-menu hidden">
      <button class="context-item" data-action="reply">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg>
        <span>Ответить</span>
      </button>
      <button class="context-item" data-action="edit">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        <span>Редактировать</span>
      </button>
      <button class="context-item" data-action="delete">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
        <span>Удалить</span>
      </button>
    </div>

    <div id="drag-overlay" class="drag-overlay hidden">
      <div class="drag-content glass">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>Перетащите файлы сюда</p>
      </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
